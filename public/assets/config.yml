    highlight-secondary: "#8b5cf6"
    highlight-hover: "#a78bfa"
    background: "#f5f3ff"
    card-background: "#ffffff"
    text: "#1e293b"
    text-header: "#4c1d95"
    text-title: "#3b0764"
    text-subtitle: "#64748b"
    card-shadow: rgba(0, 0, 0, 0.05)
    link: "#7c3aed"
    link-hover: "#6d28d9"
  dark:
    highlight-primary: "#8b5cf6"
    highlight-secondary: "#a78bfa"
    highlight-hover: "#c4b5fd"
    background: "#0f0720"
    card-background: "#1a1033"
    text: "#e2e8f0"
    text-header: "#ffffff"
    text-title: "#ede9fe"
    text-subtitle: "#a5b4fc"
    card-shadow: rgba(0, 0, 0, 0.4)
